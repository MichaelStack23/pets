<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pet World</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f7fb;
      color:#333;
    }

    header{
      background:#ff914d;
      color:white;
      padding:20px;
      text-align:center;
    }

    nav{
      margin-top:10px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 15px;
      font-weight:bold;
    }

    .hero{
      height:300px;
      background:url('https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200&auto=format&fit=crop') center/cover;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      text-align:center;
    }

    .hero h1{
      background:rgba(0,0,0,0.5);
      padding:20px;
      border-radius:10px;
      font-size:40px;
    }

    .pets{
      padding:50px 20px;
      text-align:center;
    }

    .pets h2{
      margin-bottom:30px;
      color:#ff914d;
    }

    .pet-container{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .pet-card{
      background:white;
      width:250px;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .pet-card:hover{
      transform:translateY(-5px);
    }

    .pet-card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .pet-card h3{
      margin:15px 0 10px;
    }

    .pet-card p{
      padding:0 15px 20px;
      color:#666;
    }

    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }

    @media(max-width:768px){
      .hero h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>🐾 Pet World</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#">Pets</a>
      <a href="#">Gallery</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Welcome to the Cute Pets Website</h1>
  </section>

  <section class="pets">
    <h2>Our Lovely Pets</h2>

    <div class="pet-container">

      <div class="pet-card">
        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=800&auto=format&fit=crop" alt="Dog">
        <h3>Golden Dog</h3>
        <p>Friendly and loyal companion for your family.</p>
      </div>

      <div class="pet-card">
        <img src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=800&auto=format&fit=crop" alt="Cat">
        <h3>Lovely Cat</h3>
        <p>Soft, playful, and adorable indoor pet.</p>
      </div>

      <div class="pet-card">
        <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?q=80&w=800&auto=format&fit=crop" alt="Rabbit">
        <h3>Cute Rabbit</h3>
        <p>Small and fluffy pet that everyone loves.</p>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 Pet World | All Rights Reserved</p>
  </footer>

</body>
</html>
